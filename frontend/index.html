<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Assisted Timetable Management System</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>AI Assisted Timetable Management System</h1>
            <p>Intelligent Faculty Schedule Generator</p>
        </header>

        <main>
            <!-- Teacher Input Section -->
            <section class="section">
                <h2>Add Teacher</h2>
                <div class="form-group">
                    <input type="text" id="teacherId" placeholder="Teacher ID (e.g., T001)" required>
                    <input type="text" id="teacherName" placeholder="Teacher Name" required>
                    <button onclick="addTeacher()">Add Teacher</button>
                </div>
                <div id="teacherMessage" class="message"></div>
            </section>

            <!-- Subject Input Section -->
            <section class="section">
                <h2>Add Subject to Teacher</h2>
                <div class="form-group">
                    <select id="teacherSelect" required>
                        <option value="">Select Teacher</option>
                    </select>
                    <input type="text" id="subjectName" placeholder="Subject Name (e.g., AAI, OOPS)" required>
                    <input type="number" id="yearLevel" min="1" max="4" placeholder="Year Level (1-4)" required>
                    <input type="text" id="section" placeholder="Section (A, B, C, etc.)" required>
                    <input type="number" id="hoursPerWeek" min="1" placeholder="Hours per Week" required>
                    <label>
                        <input type="checkbox" id="isLab"> Is Lab Period?
                    </label>
                    <button onclick="addSubject()">Add Subject</button>
                </div>
                <div id="subjectMessage" class="message"></div>
            </section>

            <!-- Teachers and Subjects List -->
            <section class="section">
                <h2>Teachers and Subjects</h2>
                <div id="teachersList" class="teachers-list"></div>
            </section>

            <!-- Generate and Download Section -->
            <section class="section">
                <h2>Generate Timetable</h2>
                <div class="form-group">
                    <button onclick="generateTimetable()" class="btn-primary">Generate Timetable</button>
                    <button onclick="clearAllData()" class="btn-danger">Clear All Data</button>
                </div>
                <div id="generateMessage" class="message"></div>
            </section>

            <!-- Timetable Display Section -->
            <section class="section" id="timetableSection" style="display: none;">
                <h2>Generated Timetable</h2>
                <div id="timetableContainer" class="timetable-container"></div>
                <div class="form-group">
                    <button onclick="downloadExcel()" class="btn-success">Download Excel</button>
                    <button onclick="downloadPDF()" class="btn-success">Download PDF</button>
                </div>
                <div id="downloadMessage" class="message"></div>
            </section>
        </main>
    </div>

    <!-- Edit Subject Modal -->
    <div id="editModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeEditModal()">&times;</span>
            <h2>Edit Subject</h2>
            <input type="hidden" id="editSubjectId">
            <div class="form-group">
                <input type="text" id="editSubjectName" placeholder="Subject Name" required>
            </div>
            <div class="form-group">
                <input type="number" id="editYearLevel" min="1" max="4" placeholder="Year Level (1-4)" required>
            </div>
            <div class="form-group">
                <input type="text" id="editSection" placeholder="Section (A, B, C, etc.)" required>
            </div>
            <div class="form-group">
                <input type="number" id="editHoursPerWeek" min="1" placeholder="Hours per Week" required>
            </div>
            <div class="form-group">
                <label>
                    <input type="checkbox" id="editIsLab"> Is Lab Period?
                </label>
            </div>
            <div class="form-group">
                <button onclick="updateSubject()" class="btn-primary">Update Subject</button>
                <button onclick="closeEditModal()" class="btn-danger">Cancel</button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
